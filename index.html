<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knižní kvíz | Knihobot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-900: #0D2B1F;
      --green-700: #1B5C3A;
      --green-100: #EAF5EE;
      --yellow:    #F5C330;
      --yellow-bg: #FFFAEC;
      --red:       #D93025;
      --red-bg:    #FFF0EE;
      --gray-200:  #E5E7EB;
      --gray-400:  #9CA3AF;
      --gray-600:  #4B5563;
      --text:      #111827;
      --radius:    12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #F3F4F6;
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--green-900);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .logo-accent { color: var(--yellow); }
    .header-rule { width: 1px; height: 20px; background: rgba(255,255,255,0.2); margin: 0 4px; }
    .header-tag { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1px; }
    .header-date { margin-left: auto; font-size: 13px; color: rgba(255,255,255,0.45); }

    .container { max-width: 560px; margin: 0 auto; padding: 28px 16px 60px; }

    .day-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--green-700); color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 5px 14px; border-radius: 100px; margin-bottom: 16px;
    }
    .game-title { font-size: 26px; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .game-subtitle { font-size: 15px; color: var(--gray-600); margin-bottom: 24px; line-height: 1.5; }

    .hints-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .hint-card {
      background: #fff;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      animation: fadeSlideIn 0.35s ease both;
    }
    .hint-card.newest  { border-color: var(--green-700); box-shadow: 0 0 0 3px rgba(27,92,58,0.08); }
    .hint-card.dimmed  { opacity: 0.38; border-color: var(--gray-200); }
    .hint-card.dimmed .hint-num { background: var(--gray-400); }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hint-num {
      width: 34px; height: 34px;
      background: var(--green-900); color: #fff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; flex-shrink: 0;
    }
    .hint-body { flex: 1; min-width: 0; }
    .hint-label { font-size: 11px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 3px; }
    .hint-value { font-size: 17px; font-weight: 700; color: var(--text); }

    .wrong-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .wrong-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--red-bg); border: 1.5px solid #FECDCA;
      border-radius: 100px; padding: 5px 12px;
      font-size: 13px; color: var(--red); font-weight: 500;
      animation: fadeSlideIn 0.2s ease both;
    }

    .input-section { margin-bottom: 14px; }
    .input-card {
      background: #fff; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); padding: 16px;
      transition: border-color 0.2s;
    }
    .input-card.error-shake { border-color: var(--red); animation: shake 0.3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-7px); }
      75%     { transform: translateX(7px); }
    }
    .input-label { font-size: 13px; font-weight: 600; color: var(--gray-600); margin-bottom: 10px; }
    .input-row { display: flex; gap: 8px; }
    .text-input {
      flex: 1; padding: 11px 14px;
      border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
      font-size: 15px; font-family: inherit; outline: none;
      transition: border-color 0.2s; color: var(--text);
    }
    .text-input:focus { border-color: var(--green-700); }

    .btn {
      border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; font-family: inherit;
      cursor: pointer; padding: 11px 18px; white-space: nowrap;
    }
    .btn-primary { background: var(--green-700); color: #fff; }
    .btn-primary:hover { background: var(--green-900); }

    .btn-outline {
      width: 100%; background: transparent;
      color: var(--gray-600); border: 1.5px solid var(--gray-200);
      padding: 12px; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
      transition: all 0.15s;
    }
    .btn-outline:hover { background: var(--gray-200); color: var(--text); }

    .hint-counter-text { font-size: 12px; color: var(--gray-400); margin-top: 8px; text-align: right; }

    .result-card {
      display: none; background: #fff;
      border: 1.5px solid var(--gray-200); border-radius: var(--radius);
      padding: 32px 24px 24px; text-align: center;
      animation: fadeSlideIn 0.4s ease both;
    }
    .result-card.visible { display: block; }
    .result-emoji { font-size: 52px; margin-bottom: 12px; line-height: 1; }
    .result-heading { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .result-heading.win  { color: var(--green-700); }
    .result-heading.lose { color: var(--text); }
    .result-book-title  { font-size: 19px; font-weight: 800; margin-top: 16px; margin-bottom: 2px; }
    .result-book-author { font-size: 14px; color: var(--gray-400); margin-bottom: 20px; }
    .score-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--yellow-bg); border: 1.5px solid var(--yellow);
      border-radius: 100px; padding: 7px 18px;
      font-size: 14px; font-weight: 700; color: #7A5400; margin-bottom: 20px;
    }
    .result-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
    .rdot { width: 36px; height: 36px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
    .rdot-green { background: var(--green-700); color: #fff; }
    .rdot-red   { background: var(--red);       color: #fff; }
    .rdot-gray  { background: var(--gray-200); }

    .btn-share {
      width: 100%; background: var(--yellow); color: #1A1A1A;
      border: none; border-radius: var(--radius-sm);
      font-size: 16px; font-weight: 800; font-family: inherit; cursor: pointer;
      padding: 15px; margin-bottom: 16px;
    }
    .btn-share:hover { background: #E8B520; }
    .btn-show-all {
      width: 100%; background: transparent; color: var(--green-700);
      border: 1.5px solid var(--green-700); border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
      padding: 10px; margin-bottom: 16px; transition: all 0.15s;
    }
    .btn-show-all:hover { background: var(--green-100); }

    /* Bonus / platina */
    .bonus-card {
      background: #FFFBEC; border: 2px solid var(--yellow);
      border-radius: var(--radius); padding: 20px; margin-bottom: 14px;
    }
    .bonus-badge {
      display: inline-flex; align-items: center;
      background: var(--green-700); color: #fff;
      font-size: 12px; font-weight: 700; padding: 4px 12px;
      border-radius: 100px; margin-bottom: 10px;
    }
    .bonus-title    { font-size: 17px; font-weight: 800; margin-bottom: 4px; }
    .bonus-subtitle { font-size: 14px; color: var(--gray-600); margin-bottom: 14px; }
    .btn-platinum   { background: linear-gradient(135deg,#F5C330,#E09000); color: #1A1A1A; }
    .btn-platinum:hover { background: linear-gradient(135deg,#E8B520,#C88000); }
    .result-heading.platinum { color: #A07000; }

    /* Vzdát se */
    .btn-giveup {
      background: none; border: none;
      color: var(--gray-400); font-size: 13px; font-family: inherit;
      cursor: pointer; padding: 8px; width: 100%;
      text-decoration: underline; transition: color 0.15s;
    }
    .btn-giveup:hover { color: var(--red); }

    .countdown-row { font-size: 13px; color: var(--gray-400); }
    .countdown-value { font-weight: 700; color: var(--text); }

    /* ─── NAME OVERLAY ─── */
    .name-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .name-box {
      background: #fff; border-radius: var(--radius);
      padding: 32px 28px; width: 100%; max-width: 380px;
      text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .name-box-emoji { font-size: 40px; margin-bottom: 12px; }
    .name-box-title { font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .name-box-sub { font-size: 14px; color: var(--gray-600); margin-bottom: 20px; }
    .name-box .text-input { width: 100%; margin-bottom: 12px; }
    .name-box .btn-primary { width: 100%; padding: 13px; font-size: 15px; }

    /* ─── PROFILE SEKCE ─── */
    .profile-wrap {
      margin-top: 32px;
      border-top: 2px solid var(--gray-200);
      padding-top: 24px;
    }
    .profile-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .profile-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--green-700); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800; flex-shrink: 0;
    }
    .profile-name { font-size: 17px; font-weight: 800; }
    .profile-streak { font-size: 13px; color: var(--gray-600); }

    .profile-tabs {
      display: flex; gap: 6px; margin-bottom: 20px;
    }
    .tab-btn {
      flex: 1; background: #fff; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm); padding: 9px 6px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; color: var(--gray-600); transition: all 0.15s;
    }
    .tab-btn.active { background: var(--green-900); color: #fff; border-color: var(--green-900); }
    .tab-btn:hover:not(.active) { background: var(--gray-200); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Stats */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;
    }
    .stat-box {
      background: #fff; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); padding: 14px 10px; text-align: center;
    }
    .stat-num { font-size: 24px; font-weight: 800; color: var(--green-700); }
    .stat-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* Medal calendar */
    .calendar-title { font-size: 13px; font-weight: 700; color: var(--gray-600); margin-bottom: 10px; }
    .medal-strip { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; }
    .medal-day {
      width: 30px; height: 30px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border: 1.5px solid transparent;
      position: relative; cursor: default;
    }
    .medal-day.platinum { background: linear-gradient(135deg,#F5C330,#E09000); }
    .medal-day.gold     { background: var(--yellow-bg); border-color: var(--yellow); }
    .medal-day.bronze   { background: #FFF0EE; border-color: #FECDCA; }
    .medal-day.empty    { background: var(--gray-200); }
    .medal-day.today    { box-shadow: 0 0 0 2px var(--green-700); }

    /* Achievements */
    .achieve-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
    }
    .achieve-card {
      background: #fff; border: 1.5px solid var(--gray-200);
      border-radius: var(--radius); padding: 14px;
      display: flex; gap: 12px; align-items: flex-start;
    }
    .achieve-card.unlocked { border-color: var(--yellow); background: var(--yellow-bg); }
    .achieve-icon { font-size: 24px; flex-shrink: 0; line-height: 1; }
    .achieve-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .achieve-desc { font-size: 11px; color: var(--gray-400); line-height: 1.4; }
    .achieve-card.locked { opacity: 0.5; filter: grayscale(1); }
    .achieve-card.locked .achieve-icon::after { content: '🔒'; font-size: 10px; position: relative; top: -8px; left: -4px; }

    /* Leaderboard */
    .lb-section-title { font-size: 13px; font-weight: 700; color: var(--gray-600); margin-bottom: 10px; }
    .lb-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: #fff;
      border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
      margin-bottom: 6px; font-size: 14px;
    }
    .lb-row.lb-you { border-color: var(--green-700); background: var(--green-100); font-weight: 700; }
    .lb-pos { width: 26px; font-weight: 800; color: var(--gray-400); flex-shrink: 0; }
    .lb-pos.top3 { color: var(--yellow); }
    .lb-name { flex: 1; }
    .lb-score { font-weight: 700; color: var(--green-700); }
    .lb-score-label { font-size: 11px; color: var(--gray-400); }

    /* Testovací tlačítko */
    .dev-divider {
      margin-top: 40px;
      border-top: 1px dashed var(--gray-200);
      padding-top: 20px;
      text-align: center;
    }
    .dev-label { font-size: 11px; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 10px; }
    .btn-dev {
      background: #fff; color: var(--gray-600);
      border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer;
      padding: 10px 20px; transition: all 0.15s;
    }
    .btn-dev:hover { background: var(--gray-200); color: var(--text); }

    @media (max-width: 420px) {
      .game-title { font-size: 22px; }
      .hint-value  { font-size: 15px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">knihobot <span class="logo-accent">knižní kvíz</span></div>
  <div class="header-rule"></div>
  <div class="header-tag">Denní kvíz</div>
  <div class="header-date" id="headerDate"></div>
</header>

<div class="container">
  <div class="day-pill">📚 <span id="dayDatePill"></span></div>

  <h1 class="game-title">Uhádneš dnešní knihu?</h1>
  <p class="game-subtitle">Postupně ti odkrýváme nápovědy. Čím méně nápověd potřebuješ, tím lépe!</p>

  <div class="hints-list"   id="hintsList"></div>
  <div class="wrong-list"   id="wrongList"></div>

  <div class="input-section" id="inputSection">
    <div class="input-card" id="inputCard">
      <div class="input-label">Jaká je to kniha?</div>
      <div class="input-row">
        <input id="guessInput" class="text-input" type="text"
               placeholder="Napiš název knihy…" autocomplete="off" autocorrect="off">
        <button class="btn btn-primary" onclick="submitGuess()">Hádat</button>
      </div>
      <div class="hint-counter-text" id="hintCounter"></div>
    </div>
    <div style="height:10px"></div>
    <button class="btn-outline" id="nextHintBtn" onclick="skipToNextHint()" style="display:none;">
      Zobrazit další nápovědu →
    </button>
    <button class="btn-giveup" id="giveUpBtn" onclick="giveUp()">Vzdát se</button>
  </div>

  <div class="bonus-section" id="bonusSection" style="display:none;"></div>
  <div class="result-card" id="resultCard"></div>

  <!-- Profil sekce -->
  <div class="profile-wrap" id="profileWrap" style="display:none;">
    <div class="profile-header">
      <div class="profile-avatar" id="profileAvatar">?</div>
      <div>
        <div class="profile-name" id="profileNameDisplay">–</div>
        <div class="profile-streak" id="profileStreakDisplay"></div>
      </div>
    </div>
    <div class="profile-tabs">
      <button class="tab-btn active" id="tabBtnProfile"      onclick="switchTab('profile')">👤 Profil</button>
      <button class="tab-btn"        id="tabBtnAchievements" onclick="switchTab('achievements')">🏆 Odznáčky</button>
      <button class="tab-btn"        id="tabBtnLeaderboard"  onclick="switchTab('leaderboard')">📊 Žebříček</button>
    </div>
    <div id="tabProfile"      class="tab-content active"></div>
    <div id="tabAchievements" class="tab-content"></div>
    <div id="tabLeaderboard"  class="tab-content"></div>
  </div>

  <!-- Testovací tlačítko -->
  <div class="dev-divider">
    <div class="dev-label">Testování prototypu</div>
    <button class="btn-dev" onclick="nextDay()">🌙 Probudit se zítra</button>
  </div>
</div>

<!-- Name overlay -->
<div class="name-overlay" id="nameOverlay" style="display:none;">
  <div class="name-box">
    <div class="name-box-emoji">📚</div>
    <div class="name-box-title">Ahoj! Jak ti máme říkat?</div>
    <div class="name-box-sub">Jméno se zobrazí v žebříčku hráčů</div>
    <input id="nameInput" class="text-input" type="text" placeholder="Jméno nebo přezdívka…" maxlength="20" autocomplete="off">
    <button class="btn btn-primary" onclick="confirmName()">Začít hrát →</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DATABÁZE 30 KNIH
   Pravidla:
   – postava = vedlejší, ne hlavní protagonista
   – žánr = základní kategorie
   – místo = nesmí být název knihy
   ═══════════════════════════════════════════════ */
const BOOKS = [
  {
    title: "Harry Potter a Kámen mudrců",
    author: "J. K. Rowlingová",
    seriesName: "Harry Potter",
    hints: [
      { icon: "👤", label: "Postava z knihy",         value: "Neville Longbottom" },
      { icon: "📖", label: "Žánr",                    value: "Fantasy" },
      { icon: "🌍", label: "Místo nebo svět",          value: "Bradavice" },
      { icon: "✍️", label: "Křestní jméno autorky",    value: "Joanne" },
      { icon: "📅", label: "Rok 1. vydání originálu",       value: "1997" }
    ]
  },
  {
    title: "Pán prstenů: Společenstvo prstenu",
    author: "J. R. R. Tolkien",
    seriesName: "Pán prstenů",
    hints: [
      { icon: "👤", label: "Postava z knihy",         value: "Glorfindel" },
      { icon: "📖", label: "Žánr",                    value: "Fantasy" },
      { icon: "🌍", label: "Místo nebo svět",          value: "Středozem" },
      { icon: "✍️", label: "Křestní jméno autora",     value: "John" },
      { icon: "📅", label: "Rok 1. vydání originálu",       value: "1954" }
    ]
  },
  {
    title: "1984",
    author: "George Orwell",
    hints: [
      { icon: "👤", label: "Postava z knihy",         value: "O'Brien" },
      { icon: "📖", label: "Žánr",                    value: "Dystopie" },
      { icon: "🌍", label: "Místo nebo svět",          value: "Oceánie" },
      { icon: "✍️", label: "Křestní jméno autora",     value: "George" },
      { icon: "📅", label: "Rok 1. vydání originálu",       value: "1949" }
    ]
  },
  {
    title: "Malý princ",
    author: "Antoine de Saint-Exupéry",
    hints: [
      { icon: "👤", label: "Postava z knihy",         value: "Liška" },
      { icon: "📖", label: "Žánr",                    value: "Pohádka" },
      { icon: "🌍", label: "Místo nebo svět",          value: "Poušť Sahara" },
      { icon: "✍️", label: "Křestní jméno autora",     value: "Antoine" },
      { icon: "📅", label: "Rok 1. vydání originálu",       value: "1943" }
    ]
  },
  {
    title: "Babička",
    author: "Božena Němcová",
    hints: [
      { icon: "👤", label: "Postava z knihy",         value: "Viktorka" },
      { icon: "📖", label: "Žánr",                    value: "Historická próza" },
      { icon: "🌍", label: "Místo nebo svět",          value: "Staré Bělidlo, Ratibořice" },
      { icon: "✍️", label: "Křestní jméno autorky",    value: "Božena" },
      { icon: "📅", label: "Rok 1. vydání originálu",       value: "1855" }
    ]
  },
  {
    title: "Dívka s dračím tetováním",
    author: "Stieg Larsson",
    hints: [
      { icon: "👤", label: "Postava z knihy",         value: "Harriet Vangerová" },
      { icon: "📖", label: "Žánr",                    value: "Thriller" },
      { icon: "🌍", label: "Místo nebo svět",          value: "Ostrov Hedeby, Švédsko" },
      { icon: "✍️", label: "Křestní jméno autora",     value: "Stieg" },
      { icon: "📅", label: "Rok 1. vydání originálu",       value: "2005" }
    ]
  },
  {
    title: "Hunger Games",
    author: "Suzanne Collins",

   STAV HRY
   ═══════════════════════════════════════════════ */
let testOffset = 0;

function getDisplayDate() {
  const d = new Date();
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + testOffset);
  return d;
}

let state = {
  bookIdx:       0,
  revealed:      1,
  wrongGuesses:  [],
  gameOver:      false,
  won:           false,
  showAllHints:  false,
  hint5Attempts: 0,
  gaveUp:        false,
  bonusPhase:    false,
  seriesGuessed: false,
  platinumWon:   false
};

/* ═══════════════════════════════════════════════
   POMOCNÉ FUNKCE
   ═══════════════════════════════════════════════ */
function getDayNumber() {
  const epoch = new Date('2025-01-01T00:00:00');
  const now   = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.floor((now - epoch) / 86400000) + testOffset;
}

function normalize(s) {
  return s.toLowerCase()
    .normalize('NFD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = [];
  for (let i = 0; i <= m; i++) {
    dp[i] = [i];
    for (let j = 1; j <= n; j++)
      dp[i][j] = i === 0 ? j : 0;
  }
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1]
        ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

function fuzzyMatch(a, b) {
  if (a === b) return true;
  const len = Math.max(a.length, b.length);
  const maxDist = len <= 4 ? 0 : len <= 8 ? 1 : 2;
  return levenshtein(a, b) <= maxDist;
}

function pokusText(n) {
  if (n === 1) return 'zbývá 1 pokus';
  if (n <= 4) return `zbývají ${n} pokusy`;
  return `zbývá ${n} pokusů`;
}

function isSeriesMatch(input, book) {
  if (!book.seriesName) return false;
  return normalize(input) === normalize(book.seriesName);
}

function isCorrect(input, title) {
  const ni = normalize(input);
  const nt = normalize(title);
  // Přesná shoda nebo shoda s tolerancí překlepů
  if (fuzzyMatch(ni, nt)) return true;
  // Shoda podtitulu za dvojtečkou (např. "Společenstvo prstenu")
  const colonIdx = title.indexOf(':');
  if (colonIdx > -1) {
    const sub = normalize(title.slice(colonIdx + 1).trim());
    if (fuzzyMatch(ni, sub)) return true;
  }
  return false;
}

function isBonusCorrect(input, book) {
  const ni = normalize(input);

  // Přesná (nebo fuzzy) shoda s plným názvem
  if (fuzzyMatch(ni, normalize(book.title))) return true;

  // Shoda za dvojtečkou
  const colonIdx = book.title.indexOf(':');
  if (colonIdx > -1) {
    const sub = normalize(book.title.slice(colonIdx + 1).trim());
    if (fuzzyMatch(ni, sub)) return true;
  }

  // Shoda s unikátní částí titulu (po odebrání názvu série)
  if (!book.seriesName) return false;
  const nTitle  = normalize(book.title);
  const nSeries = normalize(book.seriesName);
  if (!nTitle.startsWith(nSeries)) return false;

  let uniquePart = nTitle.slice(nSeries.length).trim();
  uniquePart = uniquePart.replace(/^[:\-]+\s*/, '').replace(/^(a|i)\s+/, '').trim();
  if (!uniquePart) return false;

  // Vstup musí fuzzy-matchovat unikátní část jako celek
  if (fuzzyMatch(ni, uniquePart)) return true;

  // Nebo obsahovat všechna klíčová slova unikátní části
  const words = uniquePart.split(' ').filter(w => w.length > 1);
  return words.length > 0 && words.every(w =>
    ni.split(' ').some(nw => fuzzyMatch(nw, w))
  );
}

   RENDER
   ═══════════════════════════════════════════════ */
function renderHints() {
  const book  = BOOKS[state.bookIdx];
  const list  = document.getElementById('hintsList');
  list.innerHTML = '';
  const count = (state.showAllHints || state.gaveUp) ? 5 : state.revealed;
  for (let i = 0; i < count; i++) {
    const h       = book.hints[i];
    const isNew   = !state.showAllHints && !state.gaveUp && i === state.revealed - 1;
    const isDim   = state.showAllHints && !state.gaveUp && i >= state.revealed;
    const card    = document.createElement('div');
    card.className = 'hint-card' + (isNew ? ' newest' : '') + (isDim ? ' dimmed' : '');
    card.innerHTML = `
      <div class="hint-num">${i + 1}</div>
      <div class="hint-body">
        <div class="hint-label">${h.icon} ${h.label}</div>
        <div class="hint-value">${h.value}</div>
      </div>`;
    list.appendChild(card);
  }
}

function renderWrongGuesses() {
  const list = document.getElementById('wrongList');
  list.innerHTML = '';
  state.wrongGuesses.forEach(g => {
    const chip = document.createElement('div');
    chip.className = 'wrong-chip';
    chip.innerHTML = `✗ ${g}`;
    list.appendChild(chip);
  });
}

function updateUI() {
  renderHints();
  renderWrongGuesses();

  const inputSection = document.getElementById('inputSection');
  const nextHintBtn  = document.getElementById('nextHintBtn');
  const hintCounter  = document.getElementById('hintCounter');

  if (state.gameOver) {
    inputSection.style.display = 'none';
    renderResult();
    return;
  }

  if (state.revealed === 5) {
    hintCounter.textContent = `Poslední nápověda — ${pokusText(3 - state.hint5Attempts)}`;
    nextHintBtn.style.display = 'none';
  } else {
    hintCounter.textContent = `Nápověda ${state.revealed} z 5`;
    nextHintBtn.style.display = 'block';
    nextHintBtn.textContent = `Zobrazit nápovědu ${state.revealed + 1} z 5 →`;
  }
}

/* ═══════════════════════════════════════════════
   HERNÍ AKCE
   ═══════════════════════════════════════════════ */
function submitGuess() {
  if (state.gameOver || state.bonusPhase) return;
  const input = document.getElementById('guessInput');
  const val   = input.value.trim();
  if (!val) return;

  const book = BOOKS[state.bookIdx];

  if (isCorrect(val, book.title)) {
    state.won      = true;
    state.gameOver = true;
    saveState();
    updateUI();
  } else if (isSeriesMatch(val, book)) {
    state.won           = true;
    state.seriesGuessed = true;
    state.bonusPhase    = true;
    saveState();
    input.value = '';
    document.getElementById('inputSection').style.display = 'none';
    renderBonusSection();
  } else {
    state.wrongGuesses.push(val);
    input.value = '';

    const card = document.getElementById('inputCard');
    card.classList.add('error-shake');
    setTimeout(() => card.classList.remove('error-shake'), 350);

    if (state.revealed === 5) {
      state.hint5Attempts++;
      if (state.hint5Attempts >= 3) {
        setTimeout(() => { state.gameOver = true; saveState(); updateUI(); }, 380);
        return;
      }
    } else {
      state.revealed++;
    }

    saveState();
    setTimeout(() => updateUI(), 380);
  }
}

function giveUp() {
  state.gaveUp   = true;
  state.gameOver = true;
  state.won      = false;
  saveState();
  updateUI();
}

function renderBonusSection() {
  const section = document.getElementById('bonusSection');
  section.style.display = 'block';
  section.innerHTML = `
    <div class="bonus-card">
      <div class="bonus-badge">🎯 Série uhodnutá!</div>
      <div class="bonus-title">Platinové vítězství na dosah</div>
      <div class="bonus-subtitle">Víš i přesný název tohoto dílu?</div>
      <div class="input-row">
        <input id="bonusInput" class="text-input" type="text"
               placeholder="Přesný název knihy…" autocomplete="off" autocorrect="off">
        <button class="btn btn-platinum" onclick="submitBonus()">Potvrdit</button>
      </div>
      <div style="height:8px"></div>
      <button class="btn-outline" onclick="skipBonus()">Přeskočit → zobrazit výsledek</button>
    </div>`;
  const bi = document.getElementById('bonusInput');
  bi.focus();
  bi.onkeydown = e => { if (e.key === 'Enter') submitBonus(); };
}

function submitBonus() {
  const input = document.getElementById('bonusInput');
  const val   = input.value.trim();
  if (!val) return;
  const book = BOOKS[state.bookIdx];
  if (isBonusCorrect(val, book)) {
    state.platinumWon = true;
    finishBonus();
  } else {
    // Špatný díl — zatřepat, vyčistit, nechat zkusit znovu
    const bonusCard = document.querySelector('.bonus-card');
    bonusCard.style.outline = '2px solid var(--red)';
    bonusCard.classList.add('error-shake');
    setTimeout(() => {
      bonusCard.classList.remove('error-shake');
      bonusCard.style.outline = '';
    }, 400);
    input.value = '';
    input.focus();
  }
}

function skipBonus() { finishBonus(); }

function finishBonus() {
  state.bonusPhase = false;
  state.gameOver   = true;
  saveState();
  document.getElementById('bonusSection').style.display = 'none';
  document.getElementById('bonusSection').innerHTML = '';
  const rc = document.getElementById('resultCard');
  rc.innerHTML = '';
  rc.classList.remove('visible');
  renderResult();
}

function showAllHints() {
  state.showAllHints = true;
  renderHints();
  const btn = document.getElementById('showAllBtn');
  if (btn) btn.style.display = 'none';
}

function skipToNextHint() {
  if (state.revealed < 5) {
    state.revealed++;
    saveState();
    updateUI();
    document.getElementById('hintsList').lastElementChild
      ?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

/* ═══════════════════════════════════════════════
   VÝSLEDKOVÁ OBRAZOVKA
   ═══════════════════════════════════════════════ */
function renderResult() {
  const book = BOOKS[state.bookIdx];
  const card = document.getElementById('resultCard');
  const dayNum = getDayNumber();

  let dotsHTML = '';
  for (let i = 0; i < 5; i++) {
    if (i < state.revealed - 1)
      dotsHTML += `<div class="rdot rdot-red">✗</div>`;
    else if (i === state.revealed - 1 && state.won)
      dotsHTML += `<div class="rdot rdot-green">✓</div>`;
    else if (i === state.revealed - 1 && !state.won)
      dotsHTML += `<div class="rdot rdot-red">✗</div>`;
    else
      dotsHTML += `<div class="rdot rdot-gray"></div>`;
  }

  let emoji, headingCls, heading, scoreText;
  if (state.platinumWon) {
    emoji      = '🥇';
    headingCls = 'platinum';
    heading    = 'Platinové vítězství!';
    scoreText  = `Uhodl/a jsi sérii i přesný název dílu na ${state.revealed}. nápovědu!`;
  } else if (state.won && state.seriesGuessed) {
    emoji      = '🎉';
    headingCls = 'win';
    heading    = 'Výborně!';
    scoreText  = `Uhodl/a jsi sérii na ${state.revealed}. nápovědu!`;
  } else if (state.won) {
    emoji      = '🎉';
    headingCls = 'win';
    heading    = 'Výborně!';
    scoreText  = `Uhodl/a jsi na ${state.revealed}. nápovědu!`;
  } else if (state.gaveUp) {
    emoji      = '🏳️';
    headingCls = 'lose';
    heading    = 'Vzdal/a jsi to!';
    scoreText  = 'Tady jsou všechny nápovědy';
  } else {
    emoji      = '📚';
    headingCls = 'lose';
    heading    = 'Nevadí, příště to vyjde!';
    scoreText  = 'Dnešní knihu se nepodařilo uhodnout';
  }

  const showAllBtn = (state.won && state.revealed < 5)
    ? `<button class="btn-show-all" id="showAllBtn" onclick="showAllHints()">👁 Zobrazit zbývající nápovědy</button>`
    : '';

  card.innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-heading ${headingCls}">${heading}</div>
    <div class="result-book-title">${book.title}</div>
    <div class="result-book-author">${book.author}</div>
    ${showAllBtn}
    <div class="score-pill">🏆 ${scoreText}</div>
    <div class="result-dots">${dotsHTML}</div>
    <button class="btn-share" onclick="shareResult()">📤 Sdílet výsledek</button>
    <div class="countdown-row">Nová hádanka se tu objeví zase zítra za <span class="countdown-value" id="countdownVal">–</span></div>`;

  card.classList.add('visible');
  startCountdown();
  recordGameResult();
  refreshProfile();
}

function shareResult() {
  const book    = BOOKS[state.bookIdx];
  const dateStr = getDisplayDate().toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric', year: 'numeric' });
  let dots = '';
  for (let i = 0; i < 5; i++) {
    if (i < state.revealed - 1)                      dots += '🟥';
    else if (i === state.revealed - 1 && state.won)  dots += '🟩';
    else if (i === state.revealed - 1 && !state.won) dots += '🟥';
    else                                              dots += '⬛';
  }
  const text = state.won
    ? `📚 Knižní kvíz – ${dateStr}\n${dots}\nUhodl/a jsem na ${state.revealed}. nápovědu!\nZahraj si na knihobot.cz`
    : `📚 Knižní kvíz – ${dateStr}\n${dots}\nDnešní kniha: ${book.title}\nZahraj si na knihobot.cz`;

  if (navigator.share) {
    navigator.share({ text });
  } else {
    navigator.clipboard.writeText(text)
      .then(() => alert('Výsledek zkopírován do schránky!'))
      .catch(() => prompt('Zkopíruj výsledek:', text));
  }
}

function startCountdown() {
  function tick() {
    const now      = new Date();
    const tomorrow = new Date(now);
    tomorrow.setDate(tomorrow.getDate() + 1);
    tomorrow.setHours(0, 0, 0, 0);
    const diff = tomorrow - now;
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000)   / 1000);
    const el = document.getElementById('countdownVal');
    if (el) el.textContent =
      `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  tick();
  setInterval(tick, 1000);
}

/* ═══════════════════════════════════════════════
   UKLÁDÁNÍ STAVU (localStorage)
   ═══════════════════════════════════════════════ */
function stateKey() { return `knihobot_quiz_${getDayNumber()}`; }

function saveState() {
  try { localStorage.setItem(stateKey(), JSON.stringify(state)); } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(stateKey());
    if (!raw) return false;
    const saved = JSON.parse(raw);
    state = { ...state, ...saved };
    return true;
  } catch(e) { return false; }
}

/* ═══════════════════════════════════════════════
   UŽIVATELSKÝ PROFIL & STATISTIKY
   ═══════════════════════════════════════════════ */
const CZECH_AUTHORS = ['Božena Němcová', 'Ota Pavel', 'Milan Kundera'];

function getUser() {
  try { return JSON.parse(localStorage.getItem('kb_user') || 'null'); } catch(e) { return null; }
}
function setUser(name) {
  localStorage.setItem('kb_user', JSON.stringify({ name }));
}

function emptyStats() {
  return { played: 0, won: 0, platinum: 0, streak: 0, bestStreak: 0,
           lastPlayedDay: -1, hint1Wins: 0, perfectWins: 0, czechWins: 0,
           genreWins: {}, achievements: [] };
}
function getStats() {
  try { return { ...emptyStats(), ...JSON.parse(localStorage.getItem('kb_stats') || '{}') }; }
  catch(e) { return emptyStats(); }
}
function saveStats(s) {
  try { localStorage.setItem('kb_stats', JSON.stringify(s)); } catch(e) {}
}

function getMedal(dayNum) {
  return localStorage.getItem('kb_medal_' + dayNum) || null;
}
function saveMedal(dayNum, medal) {
  try { localStorage.setItem('kb_medal_' + dayNum, medal); } catch(e) {}
}

function recordGameResult() {
  const dayNum = getDayNumber();
  const stats  = getStats();
  if (stats.lastPlayedDay === dayNum) return; // již zaznamenáno

  const book   = BOOKS[state.bookIdx];
  const played = (state.wrongGuesses.length > 0) || state.won || state.platinumWon || state.gaveUp;
  if (!played) return;

  // Medaile
  let medal = null;
  if (state.platinumWon)                              medal = 'platinum';
  else if (state.won)                                 medal = 'gold';
  else if (!state.gaveUp && state.wrongGuesses.length > 0) medal = 'bronze';
  // gaveUp bez hádání → žádná medaile (zobrazí se jako šedé prázdné pole)
  if (medal) saveMedal(dayNum, medal);

  // Statistiky
  stats.played++;
  if (state.won || state.platinumWon) {
    stats.won++;
    const genre = book.hints[1].value;
    stats.genreWins[genre] = (stats.genreWins[genre] || 0) + 1;
    if (state.revealed === 1 && state.wrongGuesses.length === 0) stats.hint1Wins++;
    if (state.wrongGuesses.length === 0) stats.perfectWins++;
    if (CZECH_AUTHORS.includes(book.author)) stats.czechWins++;
  }
  if (state.platinumWon) stats.platinum++;

  // Série
  if (stats.lastPlayedDay === dayNum - 1) stats.streak++;
  else stats.streak = 1;
  stats.bestStreak   = Math.max(stats.bestStreak, stats.streak);
  stats.lastPlayedDay = dayNum;

  // Achievementy
  stats.achievements = checkAchievements(stats);
  saveStats(stats);
}

};

function checkAchievements(stats) {
  const unlocked = new Set(stats.achievements || []);
  for (const a of ACHIEVEMENTS_DEF) {
    if (!unlocked.has(a.id) && a.check(stats)) unlocked.add(a.id);
  }
  for (const [genre, levels] of Object.entries(GENRE_ACHIEVEMENTS)) {
    const wins = stats.genreWins[genre] || 0;
    for (const [count, [id]] of Object.entries(levels)) {
      if (!unlocked.has(id) && wins >= parseInt(count)) unlocked.add(id);
    }
  }
  return [...unlocked];
}

/* ─── TABS ─── */
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function switchTab(tab) {
  ['profile','achievements','leaderboard'].forEach(t => {
    document.getElementById('tab'    + cap(t)).classList.toggle('active', t === tab);
    document.getElementById('tabBtn' + cap(t)).classList.toggle('active', t === tab);
  });
  if (tab === 'profile')      renderProfileTab();
  if (tab === 'achievements') renderAchievementsTab();
  if (tab === 'leaderboard')  renderLeaderboardTab();
}

/* ─── RENDER: PROFIL ─── */
function renderProfileTab() {
  const stats  = getStats();
  const dayNum = getDayNumber();

  // Stats grid
  const avgHints = stats.won > 0 ? (stats.hintsSum / stats.won).toFixed(1) : '–';
  const winRate  = stats.played > 0 ? Math.round(stats.won / stats.played * 100) + '%' : '–';

  let statsHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num">${stats.streak}</div><div class="stat-label">🔥 Řada</div></div>
      <div class="stat-box"><div class="stat-num">${stats.won}</div><div class="stat-label">🥇 Výher</div></div>
      <div class="stat-box"><div class="stat-num">${winRate}</div><div class="stat-label">🎯 Úspěšnost</div></div>
      <div class="stat-box"><div class="stat-num">${stats.played}</div><div class="stat-label">📅 Odehráno</div></div>
      <div class="stat-box"><div class="stat-num">${stats.bestStreak}</div><div class="stat-label">🏆 Nejdelší řada</div></div>
      <div class="stat-box"><div class="stat-num">${stats.platinum}</div><div class="stat-label">💎 Platina</div></div>
    </div>`;

  // Medal calendar — posledních 28 dní
  const MEDAL_EMOJI = { platinum: '💎', gold: '🥇', bronze: '🔶' };
  let calHTML = '<div class="calendar-title">Posledních 28 dní</div><div class="medal-strip">';
  for (let i = 27; i >= 0; i--) {
    const d   = dayNum - i;
    const med = getMedal(d);
    const cls = med ? med : 'empty';
    const isToday = i === 0 ? ' today' : '';
    calHTML += `<div class="medal-day ${cls}${isToday}" title="${med ? MEDAL_EMOJI[med] : '–'}">${med ? MEDAL_EMOJI[med] : ''}</div>`;
  }
  calHTML += '</div>';

  document.getElementById('tabProfile').innerHTML = statsHTML + calHTML;
}

/* ─── RENDER: ODZNÁČKY ─── */
let achieveShowAll = false;

function renderAchievementsTab() {
  const stats    = getStats();
  const unlocked = new Set(stats.achievements || []);

  // Sestav všechny karty
  const cards = [];
  for (const a of ACHIEVEMENTS_DEF) {
    const isUnlocked = unlocked.has(a.id);
    cards.push(`
      <div class="achieve-card ${isUnlocked ? 'unlocked' : 'locked'}">
        <div class="achieve-icon">${a.icon}</div>
        <div>
          <div class="achieve-name">${a.name}</div>
          <div class="achieve-desc">${isUnlocked ? '✓ Odemčeno' : a.desc}</div>
        </div>
      </div>`);
  }
  for (const [genre, levels] of Object.entries(GENRE_ACHIEVEMENTS)) {
    for (const [count, [id, name]] of Object.entries(levels)) {
      const isUnlocked = unlocked.has(id);
      cards.push(`
        <div class="achieve-card ${isUnlocked ? 'unlocked' : 'locked'}">
          <div class="achieve-icon">📚</div>
          <div>
            <div class="achieve-name">${name}</div>
            <div class="achieve-desc">${isUnlocked ? '✓ Odemčeno' : `Uhodni ${count} knih žánru ${genre}`}</div>
          </div>
        </div>`);
    }
  }

  const PREVIEW = Math.ceil(cards.length / 3);
  const visible = achieveShowAll ? cards : cards.slice(0, PREVIEW);
  const btn     = achieveShowAll
    ? `<button class="btn-outline" style="margin-top:12px;" onclick="toggleAchievements()">Zobrazit méně ↑</button>`
    : `<button class="btn-outline" style="margin-top:12px;" onclick="toggleAchievements()">Zobrazit vše (${cards.length}) ↓</button>`;

  document.getElementById('tabAchievements').innerHTML =
    `<div class="achieve-grid">${visible.join('')}</div>${btn}`;
}

function toggleAchievements() {
  achieveShowAll = !achieveShowAll;
  renderAchievementsTab();
}

    { name: 'Tereza N.',  won: 38, hints: 79 },
    { name: 'Jakub M.',   won: 35, hints: 74 },
    { name: 'Eliška K.',  won: 31, hints: 65 },
    { name: 'Ondřej P.',  won: 28, hints: 58 },
    { name: 'Lucie B.',   won: 24, hints: 51 },
    { name: 'Tomáš V.',   won: 19, hints: 42 },

  const realPlayer = { name: userName, won: stats.won, hints: stats.hintsSum || 0, isYou: true };

/* ─── REFRESH PROFILU ─── */
function refreshProfile() {
  const user = getUser();
  if (!user) return;
  const stats = getStats();
  const el    = document.getElementById('profileNameDisplay');
  const av    = document.getElementById('profileAvatar');
  const st    = document.getElementById('profileStreakDisplay');
  if (el) el.textContent = user.name;
  if (av) av.textContent = user.name.charAt(0).toUpperCase();
  if (st) st.textContent = stats.streak > 0
    ? `🔥 ${stats.streak} dní v řadě`
    : `Zahraj si první hru!`;
  document.getElementById('profileWrap').style.display = 'block';
  renderProfileTab();
}

/* ─── NAME SETUP ─── */
function confirmName() {
  const val = document.getElementById('nameInput').value.trim();
  if (!val) return;
  setUser(val);
  document.getElementById('nameOverlay').style.display = 'none';
  refreshProfile();
}

function nextDay() {
  testOffset++;
  state = { bookIdx: 0, revealed: 1, wrongGuesses: [], gameOver: false, won: false, showAllHints: false, hint5Attempts: 0, gaveUp: false, bonusPhase: false, seriesGuessed: false, platinumWon: false };
  document.getElementById('resultCard').className = 'result-card';
  document.getElementById('resultCard').innerHTML = '';
  document.getElementById('bonusSection').style.display = 'none';
  document.getElementById('bonusSection').innerHTML = '';
  document.getElementById('inputSection').style.display = 'block';

}

/* ═══════════════════════════════════════════════
   INICIALIZACE
   ═══════════════════════════════════════════════ */
function init() {
  const dayNum = getDayNumber();
  state.bookIdx = dayNum % BOOKS.length;

  // Načti uložený stav pro dnešní den (pokud existuje)
  loadState();

  const d = getDisplayDate();
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('dayDatePill').textContent =
    d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'numeric', year: 'numeric' });

  document.getElementById('guessInput').onkeydown = e => {
    if (e.key === 'Enter') submitGuess();
  };

  // Nameoverlay nebo profil
  const user = getUser();
  if (!user) {
    document.getElementById('nameOverlay').style.display = 'flex';
    document.getElementById('nameInput').onkeydown = e => { if (e.key === 'Enter') confirmName(); };
  } else {
    refreshProfile();
  }

  updateUI();
}

init();
